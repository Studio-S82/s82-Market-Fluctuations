<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s82chotroi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        
        <div class="popup-market card" id="popup-market">
            <div class="header">
                <span class="kanji-small">🌸</span>
                <span>BIẾN ĐỘNG THỊ TRƯỜNG</span>
                <button class="popup-close" id="popup-close">✕</button>
            </div>
            <div class="body">
                <ul class="lists" id="popup-list"></ul>
            </div>
        </div>
        <canvas id="sakura-canvas"></canvas>

       
        <div class="card seller" id="seller-card">
            <div class="header">
                <span class="kanji-small">🌸</span>
                <span>CHỢ TRỜI — KHU THU MUA</span>
                <span class="header-sub">Tự động cập nhật giá mỗi 30 phút</span>
                <button class="popup-close" id="seller-close">✕</button>
            </div>
            <div class="body">
                <div class="body-inner" id="item-grid"></div>
                <div class="body-right" id="body-right">
                    <div class="selected-label">VẬT PHẨM ĐÃ CHỌN</div>
                    <div class="image-place">
                        <img class="img-right" src="" alt="">
                        <div class="petal-ring"></div>
                    </div>
                    <div class="selected-name" id="selected-name">— Chưa chọn —</div>
                    <div class="stock-badge" id="stock-badge">Tồn kho: 0</div>
                    <input type="number" class="input" id="sell-input" min="1" max="99999"
                        placeholder="Số lượng"
                        onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                        oninput="validity.valid||(value='')"
                        onpaste="return false">
                    <button class="btn btn-sell" id="btn-sell">
                        <span>⚖</span> BÁN
                    </button>
                    <button class="btn btn-sell-all" id="btn-sell-all">
                        <span>🌸</span> BÁN TẤT CẢ
                    </button>
                </div>
            </div>
        </div>


        <div class="card price-list" id="price-card">
            <div class="header">
                <span class="kanji-small">🌸</span>
                <span>BẢNG GIÁ</span>
            </div>
            <div class="body">
                <ul class="lists" id="price-list"></ul>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
